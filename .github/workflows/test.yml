name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Reads the pinned pnpm version from the packageManager field
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck package
        run: pnpm typecheck

      - name: Lint package
        run: pnpm lint

      - name: Package unit tests
        run: pnpm test

      - name: Build package
        run: pnpm build

      - name: Typecheck example app
        run: pnpm -C examples/blog typecheck

      # Lint must run before migrations: `node ace migration:run` regenerates
      # database/schema.ts without formatting, which would fail prettier
      - name: Lint example app
        run: pnpm -C examples/blog lint

      - name: Migrate example database
        run: node ace migration:run
        working-directory: examples/blog

      - name: Example app functional tests
        run: node ace test
        working-directory: examples/blog
